[configuration]
    display = 1
    simulation = 1
    mqtt = 0
    robot = 0
    obstacle = 0
    seed = 150
    field = 3
    debug = 0
    waittime = 200
    step = 500

[environment]
    rows = 18
    columns = 24

[display]
    x = 10
    y = 50
    width = 1000
    height = 750
    title = Warehouse Simulator

[color]
    robot = 0,100,200
    goal = 0,180,0
    other = 0,0,120
    obstacle = 255,255,255
    unknown = 50,50,0

[warehouse]
    total_pallets = 9
    max_amrs = 2
    battery_autonomy = 120
    recharge_time = 10
    charge_threshold = 20
    line_stroke = 4
    padding = 2
    show_grid = 1
    intermediate_capacity_ratio = 0.5

[zones]
    # Package entry gates (where packages arrive)
    # Format: row,column
    package_gate1 = 4,23
    package_gate2 = 5,23
    package_gate3 = 6,23
    package_gate4 = 7,23
    package_gate5 = 8,23
    package_gate6 = 9,23
    package_gate7 = 10,23
    package_gate8 = 11,23
    package_gate9 = 12,23

    # Robot spawn points for each delivery zone
    robot_spawn_zone1 = 3,23
    robot_spawn_zone2 = 14,23

    # Waypoints (intermediate checkpoints)
    waypoint_zone1 = 5,14
    waypoint_zone2 = 12,14
    # Intermediate storage areas: minRow,minCol,maxRow,maxCol
    intermediate_area_zone1 = 4,14,6,15
    intermediate_area_zone2 = 11,14,13,15
    # Recharge area: minRow,minCol,maxRow,maxCol
    recharge_area = 8,15,9,16

    # Delivery targets (final destinations)
    target_zone1 = 2,2
    target_zone2 = 16,2

    # Exit points (where robots leave after delivery)
    exit_zone1 = 2,0
    exit_zone2 = 16,0

[obstacles]
    # Each obstacle is defined as: row,column
    # Total of 12 obstacles distributed across the 18x24 warehouse
    obstacle1 = 2,10
    obstacle2 = 4,16
    obstacle3 = 5,6
    obstacle4 = 7,19
    obstacle5 = 8,4
    obstacle6 = 9,11
    obstacle7 = 11,7
    obstacle8 = 12,17
    obstacle9 = 14,5
    obstacle10 = 15,13
    obstacle11 = 3,20
    obstacle12 = 13,9
