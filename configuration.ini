[configuration]
    display = 1
    simulation = 1
    mqtt = 0
    robot = 0
    obstacle = 0
    seed = 150
    field = 3
    debug = 0
    waittime = 100
    step = 500

[environment]
    rows = 18
    columns = 24

[display]
    x = 10
    y = 50
    width = 1000
    height = 750
    title = Warehouse Simulator
    gate_rows_start = 3
    gate_rows_end = 11
    separator_rows = 2,5,8,11

[color]
    robot = 0,100,200
    goal = 180,0,0
    other = 0,0,120
    obstacle = 255,255,255
    unknown = 50,50,0
    worker = 200,160,100
    package_gate = 255,182,193

[warehouse]
    total_pallets = 9
    max_amrs = 2
    battery_autonomy = 100
    recharge_time = 10
    charge_threshold = 20
    line_stroke = 2
    padding = 2
    show_grid = 1
    intermediate_capacity_ratio = 0.5
    # Arrival distribution for pallets: uniform | poisson | geometric | binomial
    arrival_distribution = poisson

[zones]
    # Package entry gates (where packages arrive)
    # Format: row,column
    package_gate1 = 3,23
    package_gate2 = 4,23
    package_gate3 = 5,23
    package_gate4 = 6,23
    package_gate5 = 7,23
    package_gate6 = 8,23
    package_gate7 = 9,23
    package_gate8 = 10,23
    package_gate9 = 11,23

    # Robot spawn points (positioned near package gates)
    robot_spawn_zone1 = 4,22
    robot_spawn_zone2 = 12,22

    # Waypoints (intermediate checkpoints)
    waypoint_zone1 = 5,14
    waypoint_zone2 = 12,14
    # Intermediate storage areas: minRow,minCol,maxRow,maxCol
    intermediate_area_zone1 = 4,12,6,13
    intermediate_area_zone2 = 11,12,13,13
    # Recharge area: minRow,minCol,maxRow,maxCol
    recharge_area = 8,12,9,13

    # Delivery targets (final destinations)
    target_zone1 = 2,2
    target_zone2 = 16,2

    # Delivery zone visual bounding boxes: minRow,minCol,maxRow,maxCol
    delivery_zone1_visual = 1,1,3,3
    delivery_zone2_visual = 15,1,17,3

    # Exit points (where robots leave after delivery)
    exit_zone1 = 2,0
    exit_zone2 = 16,0

[workers]
    # Warehouse worker (human agent) spawn positions: row,column
    worker1 = 4,8
    worker2 = 7,4
    worker3 = 8,11
    worker4 = 8,17
    worker5 = 11,8
    worker6 = 13,13

[obstacles]
    # Each obstacle is defined as: row,column
    # Total of 12 obstacles distributed across the 18x24 warehouse
    obstacle1 = 2,10
    obstacle2 = 4,16
    obstacle3 = 5,6
    obstacle4 = 7,19
    obstacle5 = 8,4
    obstacle6 = 9,2
    obstacle7 = 11,7
    obstacle8 = 12,17
    obstacle9 = 14,5
    obstacle10 = 15,13
    obstacle11 = 3,20
    obstacle12 = 13,9
