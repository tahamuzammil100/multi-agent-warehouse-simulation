[configuration]
    display = 1
    simulation = 1
    mqtt = 0
    robot = 0
    obstacle = 0
    seed = 150
    field = 3
    debug = 0
    waittime = 300
    step = 500

[environment]
    rows = 15
    columns = 20

[display]
    x = 10
    y = 50
    width = 1000
    height = 750
    title = Warehouse Simulator

[color]
    robot = 0,100,200
    goal = 0,180,0
    other = 0,0,120
    obstacle = 255,255,255
    unknown = 50,50,0

[warehouse]
    total_pallets = 9
    max_amrs = 2
    battery_autonomy = 120
    recharge_time = 10
    charge_threshold = 20
    line_stroke = 4
    padding = 2
    show_grid = 1
    intermediate_capacity_ratio = 0.5

[zones]
    # Package entry gates (where packages arrive)
    # Format: row,column
    package_gate1 = 3,19
    package_gate2 = 4,19
    package_gate3 = 5,19
    package_gate4 = 6,19
    package_gate5 = 7,19
    package_gate6 = 8,19
    package_gate7 = 9,19
    package_gate8 = 10,19
    package_gate9 = 11,19

    # Robot spawn points for each delivery zone
    robot_spawn_zone1 = 2,19
    robot_spawn_zone2 = 12,19

    # Waypoints (intermediate checkpoints)
    waypoint_zone1 = 4,11
    waypoint_zone2 = 10,11
    # Intermediate storage areas: minRow,minCol,maxRow,maxCol
    intermediate_area_zone1 = 3,11,5,12
    intermediate_area_zone2 = 9,11,11,12
    # Recharge area: minRow,minCol,maxRow,maxCol
    recharge_area = 6,12,7,13

    # Delivery targets (final destinations)
    target_zone1 = 2,2
    target_zone2 = 13,2

    # Exit points (where robots leave after delivery)
    exit_zone1 = 1,0
    exit_zone2 = 13,0

[obstacles]
    # Each obstacle is defined as: row,column
    # Total of 10 obstacles distributed across the warehouse
    obstacle1 = 1,8
    obstacle2 = 3,13
    obstacle3 = 4,5
    obstacle4 = 6,16
    obstacle5 = 7,3
    obstacle6 = 8,9
    obstacle7 = 10,6
    obstacle8 = 11,14
    obstacle9 = 12,4
    obstacle10 = 13,11
